<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ابزار دور زدن - پشتیبان</title>
    <style>
        body { font-family: Tahoma, Arial; background: #111; color: #eee; margin: 0; padding: 20px; }
        .container { max-width: 700px; margin: auto; background: #1e1e1e; padding: 25px; border-radius: 12px; }
        h1 { color: #00ff9d; text-align: center; }
        .card { background: #252525; padding: 18px; margin: 15px 0; border-radius: 8px; border-right: 4px solid #00ff9d; }
        a { color: #00cc77; text-decoration: none; }
        button { padding: 12px 18px; background: #00cc77; color: black; border: none; border-radius: 6px; margin: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #00ff9d; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔒 صفحه پشتیبان</h1>
        <p style="text-align:center; color:#aaa;">آدرس نامفهوم - فقط برای استفاده شخصی</p>

        <div class="card">
            <h2>بهترین ابزار ۱۴۰۵</h2>
            <p><strong>Hiddify Next</strong> — قوی‌ترین گزینه فعلی</p>
            <a href="https://github.com/hiddify/hiddify-app/releases" target="_blank">دانلود Hiddify Next</a>
        </div>

        <div class="card">
            <h2>اندروید</h2>
            <button onclick="window.open('https://github.com/2dust/v2rayNG/releases','_blank')">v2rayNG</button>
            <button onclick="window.open('https://github.com/MatsuriDayo/NekoBoxForAndroid/releases','_blank')">NekoBox</button>
        </div>

        <div class="card">
            <h2>Psiphon</h2>
            <a href="https://psiphon.ca/PsiphonAndroid.apk" target="_blank">دانلود Psiphon اندروید</a><br><br>
            <a href="https://psiphon.ca/psiphon3.exe" target="_blank">دانلود Psiphon ویندوز</a>
        </div>

        <div class="card">
            <h2>کانفیگ رایگان</h2>
            <a href="https://github.com/barry-far/V2ray-Config" target="_blank">کانفیگ V2Ray به‌روز</a>
        </div>

        <p style="text-align:center; margin-top:30px; color:#666; font-size:14px;">
            این صفحه خصوصی نگه داشته شود
        </p>
    </div>
</body>
</html>
